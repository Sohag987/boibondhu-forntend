<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="50" fill="#0f172a"/>
  <circle cx="50" cy="50" r="47" fill="#1e3a5f" stroke="#2563EB" stroke-width="1.5"/>

  <!-- Left book cover -->
  <rect x="18" y="36" width="28" height="36" rx="2" fill="#2563EB" stroke="#1d4ed8" stroke-width="1"/>
  <!-- Right book cover -->
  <rect x="54" y="36" width="28" height="36" rx="2" fill="#0e7490" stroke="#0c6478" stroke-width="1"/>
  <!-- Spine -->
  <rect x="45" y="36" width="10" height="36" rx="1.5" fill="#1e3a5f"/>

  <!-- Page lines left -->
  <line x1="22" y1="44" x2="42" y2="44" stroke="#93c5fd" stroke-width="1" stroke-linecap="round" opacity="0.8"/>
  <line x1="22" y1="50" x2="42" y2="50" stroke="#93c5fd" stroke-width="1" stroke-linecap="round" opacity="0.8"/>
  <line x1="22" y1="56" x2="42" y2="56" stroke="#93c5fd" stroke-width="1" stroke-linecap="round" opacity="0.8"/>
  <line x1="22" y1="62" x2="36" y2="62" stroke="#93c5fd" stroke-width="1" stroke-linecap="round" opacity="0.5"/>

  <!-- Page lines right -->
  <line x1="58" y1="44" x2="78" y2="44" stroke="#a5f3fc" stroke-width="1" stroke-linecap="round" opacity="0.8"/>
  <line x1="58" y1="50" x2="78" y2="50" stroke="#a5f3fc" stroke-width="1" stroke-linecap="round" opacity="0.8"/>
  <line x1="58" y1="56" x2="78" y2="56" stroke="#a5f3fc" stroke-width="1" stroke-linecap="round" opacity="0.8"/>
  <line x1="58" y1="62" x2="72" y2="62" stroke="#a5f3fc" stroke-width="1" stroke-linecap="round" opacity="0.5"/>

  <!-- Left person dot -->
  <circle cx="28" cy="28" r="5" fill="#34d399"/>
  <!-- Right person dot -->
  <circle cx="72" cy="28" r="5" fill="#60a5fa"/>

  <!-- Arc connecting two friends -->
  <path d="M28 24 Q50 10 72 24" fill="none" stroke="#34d399" stroke-width="2" stroke-linecap="round" opacity="0.9"/>
  <path d="M28 24 Q50 13 72 24" fill="none" stroke="#60a5fa" stroke-width="1.2" stroke-linecap="round" opacity="0.5" stroke-dasharray="3 2"/>

  <!-- Heart at top of arc -->
  <path d="M48 14 C48 12.5 50 11 50 11 C50 11 52 12.5 52 14 C52 15.8 50 17.5 50 17.5 C50 17.5 48 15.8 48 14Z" fill="#f87171"/>
</svg>